services:
  backend:
    build:
      context: ./backend
      network: host
    container_name: habits_backend
    ports:
      - "30:3000"

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: habits_frontend
    ports:
      - "80:80"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_search: .

  db:
    image: postgres:17
    container_name: habits_postgres
    restart: always
    env_file:
      - .db.env
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:8.4-alpine
    container_name: habits_redis
    restart: always
    ports:
      - "6339:6379"
    env_file:
      - .redis.env
    command: 
      redis-server
      --requirepass $${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data

  reverse-proxy:
    image: nginx:stable-alpine
    container_name: habits_nginx
    restart: always
    ports:
      - "81:81"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
    driver: local
