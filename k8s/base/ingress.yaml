apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: habit-pet-ingress
  namespace: habit-pet
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # SSE: disable buffering for /notifications/stream/
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~* ^/notifications/stream/ {
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
      }
spec:
  ingressClassName: nginx
  rules:
    - host: habit-pet.staging.example.com  # replace with your domain
      http:
        paths:
          # Backend API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /(auth|habits|goals|users|habit_records|goal_records|notifications|api_keys|docs|redoc|openapi.json)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Frontend SPA (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
