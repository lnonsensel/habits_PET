apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: habit-pet
  labels:
    app: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: habit-pet/backend:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.tasks.celery_app:celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
          envFrom:
            - configMapRef:
                name: habit-pet-config
            - secretRef:
                name: habit-pet-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
