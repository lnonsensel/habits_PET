apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: habit-pet
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  # Beat must always have exactly 1 replica to avoid duplicate scheduled tasks
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: habit-pet/backend:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.tasks.celery_app:celery_app
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: habit-pet-config
            - secretRef:
                name: habit-pet-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
